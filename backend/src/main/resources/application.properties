spring.application.name=backend

# =============================================
# DATABASE
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/coffee_shop_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# FLYWAY (DB MIGRATIONS)
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =============================================
# JWT
# =============================================
# IMPORTANT: Thay bằng base64-encoded secret dài >= 32 chars khi production
jwt.secret=Y29mZmVlc2hvcC1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tMjAyNg==
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# =============================================
# AI (OPENAI)
# =============================================
openai.api.key=your_openai_api_key_here
openai.model=gpt-4o-mini
openai.base-url=https://api.openai.com/v1
openai.timeout-seconds=60

# =============================================
# SERVER
# =============================================
server.port=8080
server.servlet.context-path=/

# File upload: ảnh món, logo quán
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# =============================================
# CORS
# =============================================
cors.allowed-origins=http://localhost:3000

# =============================================
# SPRINGDOC / SWAGGER UI
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.packages-to-scan=com.coffeeshop.controller

# =============================================
# LOGGING
# =============================================
logging.level.com.coffeeshop=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO
